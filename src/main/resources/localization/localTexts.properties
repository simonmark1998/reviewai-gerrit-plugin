message.command.help.help=- `/help`: Show this command reference
message.command.help.message=- `/message <text>`: Send a direct message to AI without parsing commands from the message body
message.command.help.review=- `/review [--scope=patchset|commit_message] [--filter=true|false] [--debug]`: Review the full Change Set, PatchSet, or commit message
message.command.help.directives=- `/directives [text] [--remove <index>] [--reset]`: Show, add, remove, or reset dynamic directives
message.command.help.forget_thread=- `/forget_thread`: Remove stored conversation history for the current Change Set
message.command.help.configure=- `/configure [--reset] [--<CONFIG_KEY>=<CONFIG_VALUE> ...]`: Show or override dynamic configuration
message.command.help.show=- `/show --config|--local_data|--prompts|--instructions [--scope=full|patchset|commit_message]`: Display debugging information
message.command.help.command.title=HELP FOR `%s`
message.command.help.command.unknown=Unknown command in `/help` request: `%s`
message.command.help.command.help.syntax=- Syntax: `/help [command]`
message.command.help.command.help.description=- Shows the full command reference, or detailed help for a single command
message.command.help.command.message.syntax=- Syntax: `/message <text>`
message.command.help.command.message.description=- Sends a direct message to AI without interpreting slash-prefixed words inside the message body as commands
message.command.help.command.message.note=- Use this when your text contains tokens such as `/or` that are not actual commands
message.command.help.command.review.syntax=- Syntax: `/review [--scope=patchset|commit_message] [--filter=true|false] [--debug]`
message.command.help.command.review.description=- Triggers a review of the full Change Set and may cast or update a vote when voting is enabled
message.command.help.command.review.options=- Options: `--scope` limits the review to `patchset` or `commit_message`; omit it to review the full Change Set; `--filter` controls reply filtering; `--debug` shows debug details and disables filtering
message.command.help.command.directives.syntax=- Syntax: `/directives [text]`, `/directives --remove <index>`, `/directives --reset`
message.command.help.command.directives.description=- Shows dynamic directives when called without text, adds a directive when text is provided, or removes/resets directives with options
message.command.help.command.directives.options=- Options: `--remove <index>` removes a single directive; `--reset` removes all dynamic directives
message.command.help.command.directives.note=- Requires `enableMessageDebugging=true`
message.command.help.command.forget_thread.syntax=- Syntax: `/forget_thread`
message.command.help.command.forget_thread.description=- Removes the stored conversation history for the current Change Set
message.command.help.command.configure.syntax=- Syntax: `/configure [--reset] [--<CONFIG_KEY>=<CONFIG_VALUE> ...]`
message.command.help.command.configure.description=- Shows or overrides dynamic configuration values for the current Change Set
message.command.help.command.configure.options=- Options: `--reset` restores modified values to their defaults; dynamic `--<CONFIG_KEY>=<CONFIG_VALUE>` pairs override settings
message.command.help.command.configure.note=- Requires `enableMessageDebugging=true`
message.command.help.command.show.syntax=- Syntax: `/show --config|--local_data|--prompts|--instructions [--scope=full|patchset|commit_message]`
message.command.help.command.show.description=- Displays debugging information about configuration, local data, prompts, or assistant instructions
message.command.help.command.show.options=- Options: `--config`, `--local_data`, `--prompts`, `--instructions`; `--scope` limits `--prompts` and `--instructions` to `full`, `patchset`, or `commit_message`
message.command.help.command.show.note=- Requires `enableMessageDebugging=true`
message.command.help.notes.title=NOTES
message.command.help.notes.debug=- `/configure`, `/directives`, and `/show`, plus the `--debug` option on review commands, require `enableMessageDebugging=true`
message.command.help.notes.message=- Use `/message` when your text includes slash-prefixed words that are not commands
